<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-page:       #f4f3f0;
      --bg-card:       #ffffff;
      --bg-input:      #f7f6f3;
      --bg-success:    #eaf3de;
      --text-primary:  #1a1a18;
      --text-secondary:#6b6b67;
      --text-tertiary: #a5a49f;
      --text-success:  #3b6d11;
      --text-info:     #185fa5;
      --border-light:  rgba(0,0,0,0.10);
      --border-medium: rgba(0,0,0,0.18);
      --border-info:   #378add;
      --focus-ring:    rgba(24,95,165,0.08);
      --radius-md:     8px;
      --radius-lg:     12px;
      --radius-xl:     16px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg-page:       #1c1c1a;
        --bg-card:       #242422;
        --bg-input:      #2c2c2a;
        --bg-success:    #173404;
        --text-primary:  #f0efe8;
        --text-secondary:#a5a49f;
        --text-tertiary: #6b6b67;
        --text-success:  #c0dd97;
        --text-info:     #85b7eb;
        --border-light:  rgba(255,255,255,0.08);
        --border-medium: rgba(255,255,255,0.14);
        --border-info:   #378add;
        --focus-ring:    rgba(133,183,235,0.12);
      }
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg-page);
      font-family: 'DM Sans', sans-serif;
      padding: 2rem;
      position: relative;
      overflow: hidden;
    }

    .grid-bg {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border-light) 1px, transparent 1px),
        linear-gradient(90deg, var(--border-light) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    .blob {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
    }
    .blob-1 {
      width: 360px; height: 360px;
      background: #b5d4f4;
      opacity: 0.12;
      top: -100px; right: -80px;
    }
    .blob-2 {
      width: 220px; height: 220px;
      background: #c0dd97;
      opacity: 0.10;
      bottom: -60px; left: 20px;
    }

    .card {
      background: var(--bg-card);
      border: 0.5px solid var(--border-medium);
      border-radius: var(--radius-xl);
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 380px;
      position: relative;
      z-index: 1;
      animation: cardIn 0.5s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(24px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .logo-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 1.75rem;
    }

    .logo-mark {
      width: 36px; height: 36px;
      border-radius: 10px;
      background: var(--bg-card);
      border: 0.5px solid var(--border-medium);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 16px;
      color: var(--text-primary);
      letter-spacing: -1px;
    }

    .logo-name {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 15px;
      color: var(--text-primary);
      letter-spacing: -0.3px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: var(--bg-success);
      color: var(--text-success);
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 99px;
      margin-bottom: 1rem;
      font-weight: 500;
    }
    .badge-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--text-success);
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 26px;
      color: var(--text-primary);
      letter-spacing: -0.8px;
      line-height: 1.2;
      margin-bottom: 0.3rem;
    }

    .subheading {
      font-size: 14px;
      color: var(--text-secondary);
      margin-bottom: 1.75rem;
      font-weight: 300;
    }

    .field { margin-bottom: 1rem; }

    .field label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text-secondary);
      margin-bottom: 6px;
    }

    .input-wrap { position: relative; }

    .input-icon {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      width: 15px; height: 15px;
      opacity: 0.4;
      pointer-events: none;
      color: var(--text-primary);
    }

    .field input {
      width: 100%;
      padding: 10px 12px 10px 36px;
      font-size: 14px;
      font-family: 'DM Sans', sans-serif;
      border-radius: var(--radius-md);
      border: 0.5px solid var(--border-medium);
      background: var(--bg-input);
      color: var(--text-primary);
      outline: none;
      height: 40px;
      transition: border-color 0.15s, box-shadow 0.15s, background 0.15s;
    }

    .field input:focus {
      border-color: var(--border-info);
      background: var(--bg-card);
      box-shadow: 0 0 0 3px var(--focus-ring);
    }

    .field input::placeholder { color: var(--text-tertiary); }

    .forgot {
      display: block;
      text-align: right;
      font-size: 12px;
      color: var(--text-info);
      text-decoration: none;
      margin-top: -0.5rem;
      margin-bottom: 1.25rem;
    }
    .forgot:hover { text-decoration: underline; }

    .btn-submit {
      width: 100%;
      height: 42px;
      border-radius: var(--radius-md);
      border: none;
      background: var(--text-primary);
      color: var(--bg-card);
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 14px;
      letter-spacing: 0.03em;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-bottom: 1.25rem;
      transition: opacity 0.15s, transform 0.1s;
    }
    .btn-submit:hover { opacity: 0.82; }
    .btn-submit:active { transform: scale(0.98); }

    .btn-arrow { transition: transform 0.2s; }
    .btn-submit:hover .btn-arrow { transform: translateX(3px); }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 1.25rem;
    }
    .divider-line { flex: 1; height: 0.5px; background: var(--border-light); }
    .divider-text { font-size: 12px; color: var(--text-tertiary); }

    .btn-oauth {
      width: 100%;
      height: 38px;
      border-radius: var(--radius-md);
      border: 0.5px solid var(--border-medium);
      background: transparent;
      color: var(--text-primary);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 400;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-bottom: 0.6rem;
      transition: background 0.15s;
    }
    .btn-oauth:hover { background: var(--bg-input); }

    .signup-row {
      text-align: center;
      font-size: 13px;
      color: var(--text-secondary);
      margin-top: 1.25rem;
    }
    .signup-row a {
      color: var(--text-primary);
      font-weight: 500;
      text-decoration: none;
    }
    .signup-row a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="grid-bg"></div>
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>

  <div class="card">
    <div class="logo-row">
      <div class="logo-mark">A/</div>
      <span class="logo-name">Aether</span>
    </div>

    <div class="badge">
      <span class="badge-dot"></span>
      Secure connection
    </div>

    <h1>Welcome back.</h1>
    <p class="subheading">Sign in to continue to your workspace.</p>

    <form>
      <div class="field">
        <label for="username">Username</label>
        <div class="input-wrap">
          <svg class="input-icon" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="8" cy="5.5" r="2.5" stroke="currentColor" stroke-width="1.5"/>
            <path d="M2.5 13.5c0-3.038 2.462-5.5 5.5-5.5s5.5 2.462 5.5 5.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          <input id="username" type="text" placeholder="your_handle" autocomplete="username" />
        </div>
      </div>

      <div class="field">
        <label for="password">Password</label>
        <div class="input-wrap">
          <svg class="input-icon" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="3" y="7" width="10" height="7" rx="1.5" stroke="currentColor" stroke-width="1.5"/>
            <path d="M5 7V5a3 3 0 0 1 6 0v2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          <input id="password" type="password" placeholder="••••••••" autocomplete="current-password" />
        </div>
      </div>

      <a class="forgot" href="#">Forgot password?</a>

      <button type="submit" class="btn-submit">
        Sign in <span class="btn-arrow">→</span>
      </button>
    </form>

    <div class="divider">
      <div class="divider-line"></div>
      <span class="divider-text">or continue with</span>
      <div class="divider-line"></div>
    </div>

    <button class="btn-oauth" type="button">
      <svg width="15" height="15" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      Google
    </button>

    <p class="signup-row">No account? <a href="#">Create one</a></p>
  </div>
</body>
</html>
